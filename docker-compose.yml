version: '3.8'

services:
  dockercopilot:
    container_name: dockercopilot
    restart: always
    privileged: true
    # 去掉 network_mode: bridge，改用自定义网络
    ports:
      - "12712:12712"        # 宿主机端口映射，方便外部调用（可选）
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
    environment:
      - TZ=Asia/Shanghai
      - DOCKER_HOST=unix:///var/run/docker.sock
      - secretKey=xxxxx   # 不少于8位且非纯数字
    image: 0nlylty/dockercopilot:latest
    networks:
      - dockercopilot-net

  dockercopilot-bot:
    image: xydgg/dockercopilot-bot:latest
    container_name: dockercopilot-bot
    restart: unless-stopped
    volumes:
      - /root/docker/dockercopilot-bot:/app/config
    environment:
      - TZ=Asia/Shanghai
      - TELEGRAM_BOT_TOKEN=xxxx
      - TELEGRAM_CHAT_IDS=xxxxx
      - TELEGRAM_POLLING_INTERVAL=1
      - TELEGRAM_UPDATE_CHECK_CRON=*/10 * * * *
      - TELEGRAM_NOTIFY_ON_UPDATE=true
      - TELEGRAM_UPDATE_BLACKLIST=postgresql,test-container
      - TELEGRAM_AUTO_CLEAN_IMAGES=true
      - TELEGRAM_CLEAN_IMAGES_CRON=*/25 * * * *
      - TELEGRAM_AUTO_UPDATE_CONTAINERS=true
      - TELEGRAM_UPDATE_CONTAINERS_CRON=0 */2 * * *
      # 关键：API URL 中使用服务名 dockercopilot 和内部端口 12712
      - DOCKERCOPILOT_API_URLS=PVE-NAS::http://dockercopilot:12712::secretKey
    networks:
      - dockercopilot-net
    depends_on:
      - dockercopilot   # 确保核心服务先启动（可选）

networks:
  dockercopilot-net:
    driver: bridge
